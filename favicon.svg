<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0d1424"/>
    </linearGradient>
    <linearGradient id="flask-grad" x1="32" y1="13" x2="32" y2="52"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- < bracket -->
  <polyline points="16,16 5,32 16,48"
            fill="none" stroke="#e2e8f0"
            stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Flask neck -->
  <rect x="28" y="13" width="8" height="14" rx="2.5" fill="url(#flask-grad)"/>

  <!-- Flask body (Erlenmeyer / conical) -->
  <path d="M 28,26 L 24,47 Q 24,52 28,52 L 36,52 Q 40,52 40,47 L 36,26 Z"
        fill="url(#flask-grad)"/>

  <!-- Liquid bubbles -->
  <circle cx="29" cy="44" r="2"   fill="rgba(255,255,255,0.3)"/>
  <circle cx="33" cy="37" r="2.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="37" cy="46" r="1.5" fill="rgba(255,255,255,0.3)"/>

  <!-- > bracket -->
  <polyline points="48,16 59,32 48,48"
            fill="none" stroke="#e2e8f0"
            stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
