<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudLab — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Google Fonts: Geist + Geist Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Dashboard styles -->
  <link rel="stylesheet" href="css/styles.css?v=8" />

  <!-- Lucide icons (UMD, available as window.lucide) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>

<body>

  <!-- ══ HEADER ══════════════════════════════════════ -->
  <header class="site-header">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <i data-lucide="cloud" class="logo-cloud-icon"></i>
        CloudLab
      </a>
      <div class="nav-actions">
        <div class="nav-auth" id="authStatus" aria-live="polite">
          <span class="auth-loading">…</span>
        </div>
        <div id="clock"></div>
        <button class="btn-icon" id="themeToggle" title="Toggle theme">
          <i data-lucide="sun"  id="iconSun"></i>
          <i data-lucide="moon" id="iconMoon" style="display:none"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- ══ MAIN (populated by renderer.js) ════════════ -->
  <main class="main" id="main-content"></main>

  <!-- ══ FOOTER ══════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="footer-inner"></div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!--
    Load order matters:
    1. services.js  → defines DASHBOARD_CONFIG
    2. renderer.js  → defines renderDashboard()
    3. main.js      → bootstraps the app on DOMContentLoaded
  -->
  <script src="data/services.js?v=10"></script>
  <script src="js/renderer.js?v=8"></script>
  <script src="js/main.js?v=8"></script>

</body>
</html>
